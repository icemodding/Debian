# Empty listen_addresses to use systemd socket activation
listen_addresses = ['127.0.0.1:53']
server_names = [
  'quad9-dnscrypt-ip4-filter-pri',   # 20ms en tu caso, bloquea malware, sin logs
  'cloudflare',                         # Muy rápido, compromiso de no guardar logs persistentes
  'dnscrypt.eu-nl',                    # Países Bajos, sin logs
  'ffmuc.net-doh'                      # Alemania, código abierto y transparente
]

# Balanceo de carga: Weighted Power of Two (mejor relación velocidad/estabilidad)
lb_strategy = 'p2'

# --- Caché DNS (fundamental para múltiples dispositivos) ---
cache = true
cache_size = 2048               # Suficiente para tu red doméstica
cache_min_ttl = 300              # 5 minutos mínimo en caché
cache_max_ttl = 86400            # 1 día máximo
cache_neg_min_ttl = 60           # Respuestas negativas (dominio no existe) 1 minuto
cache_neg_max_ttl = 600          # Máximo para negativas: 10 minutos

# Nivel de log (1 = menos verboso, suficiente)
log_level = 1

#[query_log]
#  file = '/var/log/dnscrypt-proxy/query.log'

#[nx_log]
#  file = '/var/log/dnscrypt-proxy/nx.log'

[sources]
  [sources.'public-resolvers']
  url = 'https://download.dnscrypt.info/resolvers-list/v2/public-resolvers.md'
  cache_file = '/var/cache/dnscrypt-proxy/public-resolvers.md'
  minisign_key = 'RWQf6LRCGA9i53mlYecO4IzT51TGPpvWucNSCh1CBM0QTaLn73Y7GFO3'
  refresh_delay = 72
  prefix = ''

[blocked_names]
# Ruta al archivo que contiene la lista de dominios a bloquear
blocked_names_file = '/etc/dnscrypt-proxy/blocked-names.txt'

# (Opcional) Para llevar un registro de qué dominios se bloquean
# log_file = '/var/log/dnscrypt-proxy/blocked.log'
